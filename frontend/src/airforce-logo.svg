<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle background -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e7ba7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5f8f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circular background -->
  <circle cx="100" cy="100" r="95" fill="url(#blueGradient)" stroke="#f4d03f" stroke-width="2"/>
  
  <!-- Eagle wings -->
  <path d="M 70 100 Q 50 85 40 95 Q 50 90 70 100" fill="#d4af37" stroke="#8b7500" stroke-width="1"/>
  <path d="M 130 100 Q 150 85 160 95 Q 150 90 130 100" fill="#d4af37" stroke="#8b7500" stroke-width="1"/>
  
  <!-- Eagle head -->
  <circle cx="100" cy="80" r="12" fill="#d4af37" stroke="#8b7500" stroke-width="1"/>
  <circle cx="105" cy="78" r="3" fill="#000"/>
  
  <!-- Eagle beak -->
  <polygon points="112,80 125,78 112,82" fill="#d4af37" stroke="#8b7500" stroke-width="1"/>
  
  <!-- Shield -->
  <path d="M 100 90 L 140 110 L 140 145 Q 100 165 60 145 L 60 110 Z" fill="#f4d03f" stroke="#8b7500" stroke-width="2"/>
  
  <!-- Shield inner design -->
  <circle cx="100" cy="125" r="20" fill="#1e7ba7" stroke="none"/>
  <text x="100" y="135" font-size="28" font-weight="bold" text-anchor="middle" fill="#f4d03f" font-family="Arial">भ</text>
  
  <!-- Ribbon at bottom -->
  <ellipse cx="100" cy="155" rx="35" ry="8" fill="#f4d03f" stroke="#8b7500" stroke-width="1"/>
  <text x="100" y="160" font-size="10" font-weight="bold" text-anchor="middle" fill="#8b7500" font-family="Arial">BHARAT</text>
</svg>
